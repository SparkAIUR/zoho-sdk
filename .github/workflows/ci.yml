name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - name: Setup Python
        run: uv python install 3.12
      - name: Run security scan
        run: uv run --python 3.12 python tools/security_scan.py --mode all --report /tmp/secrets-report.json
      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-report
          path: /tmp/secrets-report.json

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Setup Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --group dev --all-extras
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Setup Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --group dev --all-extras
      - name: Mypy
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Setup Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --group dev --all-extras
      - name: Run tests
        run: uv run pytest

  docs:
    runs-on: ubuntu-latest
    env:
      DOCS_SITE_URL: ${{ vars.DOCS_SITE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate required docs variables
        run: |
          if [ -z "${DOCS_SITE_URL}" ]; then
            echo "Repository variable DOCS_SITE_URL is required."
            exit 1
          fi
      - uses: astral-sh/setup-uv@v4
      - name: Setup Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --group dev
      - name: Render Sparkify docs source
        run: |
          uv run python tools/render_sparkify_docs.py \
            --source docs \
            --output .sparkify/docs \
            --mkdocs-config mkdocs.yml
      - name: Build docs with Sparkify action
        uses: SparkAIUR/sparkify@v1
        with:
          docs-dir: ./.sparkify/docs
          out-dir: /tmp/zoho-docs-site
          site: ${{ env.DOCS_SITE_URL }}
          base: ""
          strict: "true"

  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Setup Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --group dev
      - name: Generate CRM summary
        run: |
          uv run python -m tools.codegen.main \
            --json-details tests/fixtures/json_details_minimal.json \
            --openapi tests/fixtures/openapi_minimal.json \
            --output /tmp/ir_summary.json
      - name: Generate Creator summary
        run: |
          uv run python -m tools.codegen.creator_summary \
            --openapi tests/fixtures/creator_openapi_minimal.json \
            --output /tmp/creator_summary.json
      - name: Generate Projects extraction
        run: |
          uv run python -m tools.codegen.projects_extract \
            --html tests/fixtures/projects/api_docs_sample.html \
            --output /tmp/projects_extracted_mvp.json
      - name: Generate curated product summary
        run: |
          uv run python -m tools.codegen.curated_summary \
            --spec tools/specs/people_v1_curated.json \
            --spec tools/specs/sheet_v2_curated.json \
            --spec tools/specs/workdrive_v1_curated.json \
            --spec tools/specs/cliq_v2_curated.json \
            --spec tools/specs/analytics_v2_curated.json \
            --spec tools/specs/writer_v1_curated.json \
            --spec tools/specs/mail_v1_curated.json \
            --output /tmp/curated_summary.json
      - name: Diff against golden
        run: |
          diff -u tests/golden/ir_summary.json /tmp/ir_summary.json
          diff -u tests/golden/creator_summary.json /tmp/creator_summary.json
          diff -u tests/golden/projects_extracted_mvp.json /tmp/projects_extracted_mvp.json
          diff -u tests/golden/curated_summary.json /tmp/curated_summary.json
