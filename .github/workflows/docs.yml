name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - examples/**
      - tools/**
      - mkdocs.yml
      - pyproject.toml
      - .github/workflows/docs.yml
      - .github/workflows/ci.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

env:
  DOCS_SITE_URL: ${{ vars.DOCS_SITE_URL }}
  DOCS_CUSTOM_DOMAIN: ${{ vars.DOCS_CUSTOM_DOMAIN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required docs variables
        run: |
          if [ -z "${DOCS_SITE_URL}" ]; then
            echo "Repository variable DOCS_SITE_URL is required."
            exit 1
          fi
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Setup Python
        run: uv python install 3.12
      - name: Install Python dependencies
        run: uv sync --group dev
      - name: Render Sparkify docs source
        run: |
          uv run python tools/render_sparkify_docs.py \
            --source docs \
            --output .sparkify/docs \
            --mkdocs-config mkdocs.yml
      - name: Build docs with Sparkify action
        uses: SparkAIUR/sparkify@v1
        with:
          docs-dir: ./.sparkify/docs
          out-dir: ./site
          site: ${{ env.DOCS_SITE_URL }}
          base: ""
          strict: "true"
      - name: Write CNAME
        if: ${{ env.DOCS_CUSTOM_DOMAIN != '' }}
        run: echo "${DOCS_CUSTOM_DOMAIN}" > site/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
