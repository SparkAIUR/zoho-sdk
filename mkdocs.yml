site_name: zoho SDK
site_description: Async-first Zoho Python SDK
repo_url: https://github.com/SparkAIUR/zoho-sdk
theme:
  name: material
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Client Lifecycle: client-lifecycle.md
  - Authentication:
    - Overview: authentication.md
    - Credential Setup: auth-credentials.md
    - Scope Catalog: scopes.md
    - Auth Helper CLI: auth-cli.md
    - Live Validation (Admin): admin-live-validation.md
  - Ingestion:
    - Overview: ingestion/overview.md
    - CRM: ingestion/crm.md
  - CRM:
    - Records: crm/records.md
    - Modules: crm/modules.md
    - Dynamic Discovery: crm/discovery.md
  - Creator:
    - Overview: creator/overview.md
    - Meta API: creator/meta.md
    - Data API: creator/data.md
    - Publish API: creator/publish.md
  - Projects:
    - Overview: projects/overview.md
    - Portals API: projects/portals.md
    - Projects API: projects/projects.md
    - Tasks API: projects/tasks.md
  - People:
    - Overview: people/overview.md
    - Forms API: people/forms.md
    - Employees API: people/employees.md
    - Files API: people/files.md
  - Sheet:
    - Overview: sheet/overview.md
    - Workbooks API: sheet/workbooks.md
    - Worksheets API: sheet/worksheets.md
    - Tabular API: sheet/tabular.md
  - WorkDrive:
    - Overview: workdrive/overview.md
    - Files API: workdrive/files.md
    - Folders API: workdrive/folders.md
    - Search API: workdrive/search.md
    - Recent Changes API: workdrive/changes.md
    - Admin API: workdrive/admin.md
  - Errors: errors.md
  - Performance & Caching: performance-caching.md
  - Code Generation: codegen.md
  - Changelog: changelog.md
  - Contributing: contributing.md
extra_css:
  - stylesheets/enterprise.css
markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - toc:
      permalink: true
